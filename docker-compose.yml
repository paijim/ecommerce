services:
  # Base de données PostgreSQL
  db:
    image: postgres:15
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: mypassword123
      POSTGRES_DB: techstore_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  # Backend Node.js
  backend:
    build: ./backend
    container_name: ecommerce_backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      # TRÈS IMPORTANT : On utilise 'db' au lieu de 'localhost' ici
      DATABASE_URL: postgres://user_admin:mypassword123@db:5432/techstore_db
    networks:
      - ecommerce-network

  # Frontend React (servi par Nginx)
  frontend:
    build: ./frontend
    container_name: ecommerce_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ecommerce-network

  # Monitoring : cAdvisor (pour voir les stats des conteneurs)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres_data: